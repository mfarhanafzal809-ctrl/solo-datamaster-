<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Solo DataMaster Academy — The Ultimate Zero-to-Architect Data Analyst Master Curriculum. 10 phases, 24 months, industry-level expertise." />
  <meta name="theme-color" content="#06080f" />
  <meta property="og:title" content="Solo DataMaster Academy — Zero to Architect" />
  <meta property="og:description" content="The definitive data analyst curriculum. 10 phases from statistics to AI-augmented analytics." />
  <title>Solo DataMaster Academy — Zero to Architect</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- ========== ANIMATED BACKGROUND ========== -->
  <canvas id="bg-canvas"></canvas>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- ========== SIDEBAR OVERLAY ========== -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- ========== SIDEBAR ========== -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <a class="sidebar-logo" href="javascript:void(0)" onclick="Router.navigate('home'); return false;">
        <div class="sidebar-logo-icon">DM</div>
        <div class="sidebar-logo-text">Solo DataMaster<br>Academy</div>
      </a>
    </div>

    <nav class="sidebar-nav">

      <!-- Main Navigation -->
      <div class="sidebar-section-label">Navigation</div>

      <button class="sidebar-link" data-nav="home">
        <span class="sidebar-link-icon">🏠</span> Home
      </button>

      <button class="sidebar-link" data-nav="guide">
        <span class="sidebar-link-icon">📖</span> Guide — How to Use
      </button>

      <button class="sidebar-link" data-nav="timeline">
        <span class="sidebar-link-icon">🗓️</span> 24-Month Timeline
      </button>

      <button class="sidebar-link" data-nav="strategy">
        <span class="sidebar-link-icon">⚡</span> Execution Directives
      </button>

      <button class="sidebar-link" data-nav="about">
        <span class="sidebar-link-icon">🌐</span> About
      </button>

      <!-- Phases -->
      <div class="sidebar-section-label" style="margin-top:8px;">The 10 Phases</div>

      <div class="sidebar-phase-grid">
        <button class="sidebar-phase-btn" data-phase-nav="1">P1 · Stats</button>
        <button class="sidebar-phase-btn" data-phase-nav="2">P2 · Python</button>
        <button class="sidebar-phase-btn" data-phase-nav="3">P3 · SQL</button>
        <button class="sidebar-phase-btn" data-phase-nav="4">P4 · Viz</button>
        <button class="sidebar-phase-btn" data-phase-nav="5">P5 · EDA</button>
        <button class="sidebar-phase-btn" data-phase-nav="6">P6 · Time</button>
        <button class="sidebar-phase-btn" data-phase-nav="7">P7 · Cloud</button>
        <button class="sidebar-phase-btn" data-phase-nav="8">P8 · A/B</button>
        <button class="sidebar-phase-btn" data-phase-nav="9">P9 · Fin</button>
        <button class="sidebar-phase-btn" data-phase-nav="10">P10 · AI</button>
      </div>

      <!-- Quick Stats -->
      <div class="sidebar-section-label" style="margin-top:8px;">Curriculum Stats</div>
      <div style="padding:12px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-sm);margin:0 4px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div style="text-align:center;">
            <div style="font-family:var(--font-display);font-size:22px;font-weight:700;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">10</div>
            <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">Phases</div>
          </div>
          <div style="text-align:center;">
            <div style="font-family:var(--font-display);font-size:22px;font-weight:700;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">24</div>
            <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">Months</div>
          </div>
          <div style="text-align:center;">
            <div style="font-family:var(--font-display);font-size:22px;font-weight:700;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">20+</div>
            <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">Projects</div>
          </div>
          <div style="text-align:center;">
            <div style="font-family:var(--font-display);font-size:22px;font-weight:700;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">∞</div>
            <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">ROI</div>
          </div>
        </div>
      </div>

    </nav>

    <!-- Theme Switcher -->
    <div class="sidebar-footer">
      <div style="font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;">Theme</div>
      <div class="theme-selector">
        <button class="theme-btn" data-theme-btn="dark">🌙 Dark</button>
        <button class="theme-btn" data-theme-btn="light">☀️ Light</button>
        <button class="theme-btn" data-theme-btn="system">⚙ Auto</button>
      </div>
    </div>
  </aside>

  <!-- ========== MAIN APP ========== -->
  <div class="app-wrapper">
    <div class="main-content">

      <!-- Navbar -->
      <nav class="navbar">
        <div class="nav-left">
          <button id="menu-toggle" class="menu-toggle" aria-label="Open menu">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
          </button>
          <a class="nav-brand" href="javascript:void(0)" onclick="Router.navigate('home')">
            <div class="nav-brand-icon">DM</div>
            <span class="nav-brand-text">DataMaster Academy</span>
          </a>
        </div>
        <div class="nav-right">
          <span class="nav-badge">10 PHASES · 24 MONTHS</span>
        </div>
      </nav>

      <!-- Dynamic Page View -->
      <main id="main-view">
        <!-- Rendered by Router.render() -->
        <div style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
          <div style="text-align:center;color:var(--text-muted);">
            <div style="font-size:40px;margin-bottom:16px;">⚡</div>
            <div style="font-family:var(--font-display);font-size:18px;">Loading...</div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script src="main.js?v=2"></script>
</body>
</html>
